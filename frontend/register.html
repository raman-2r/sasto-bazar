<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SastoBazar</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container" style="justify-content:center;">
            <a href="index.html" class="logo">SastoBazar</a>
        </div>
    </nav>

    <div class="form-wrapper container">
        <div class="form-card wide">
            <h2>Create an Account</h2>
            <form id="registerForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Address</label>
                        <input type="text" id="address" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender" class="form-control" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-2">Create Account</button>
            </form>
            <p class="text-center mt-2">Already have an account? <a href="login.html" style="color:var(--primary);">Log In</a></p>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                action: 'register',
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                address: document.getElementById('address').value,
                gender: document.getElementById('gender').value
            };

            const res = await apiCall('auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.success) {
                showFlash(res.message);
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                showFlash(res.message, 'error');
            }
        });
    </script>
</body>
</html>
