<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SastoBazar</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container" style="justify-content:center;">
            <a href="index.html" class="logo">SastoBazar</a>
        </div>
    </nav>

    <div class="auth-wrapper container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Log In</button>
            </form>
            <p class="text-center mt-2">Don't have an account? <a href="register.html" style="color:var(--primary);">Register Hub</a></p>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await apiCall('auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', email, password })
            });

            if (res.success) {
                showFlash('Login successful!');
                setTimeout(() => {
                    if (res.role === 'admin') {
                        window.location.href = '../backend/admin/dashboard.php';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } else {
                showFlash(res.message || 'Login failed', 'error');
            }
        });
    </script>
</body>
</html>
